name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r 00-start-here/_support/repo-config/requirements-core.txt
      - name: Repo check
        run: python 00-start-here/_support/scripts/check_repo.py
      - name: Tests
        run: pytest -q 00-start-here/_support/tests
